name: Claude Task
description: Claude가 자동으로 구현하고 PR을 열도록 요청합니다 (브랜치 생성 -> TDD 구현 -> lint/test -> PR)
title: "[Claude] "
labels: ["claude-task"]
body:
  - type: textarea
    id: description
    attributes:
      label: 요청 사항
      description: Claude가 무엇을 구현해야 하는지 구체적으로 적어주세요. 완료 조건(acceptance criteria)을 포함하면 더 정확합니다.
      placeholder: |
        예) `/health` 엔드포인트를 추가해줘.
        - GET /health 는 200과 {"status": "ok"} 를 반환해야 한다.
        - 테스트 코드도 함께 작성해줘.
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: 참고 사항 (선택)
      description: 관련 파일, 제약 조건, 참고 링크 등
